name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      TAG_NAME: ${{ github.ref_name }}
      RELEASE_ASSET_BASENAME: ForgeFF-macos-${{ github.ref_name }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      BUILD_KEYCHAIN_PASSWORD: ${{ secrets.BUILD_KEYCHAIN_PASSWORD }}
      APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
      APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
      APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
      APPLE_NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
      APPLE_NOTARY_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_API_PRIVATE_KEY_P8_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate release prerequisites
        run: |
          set -euo pipefail

          for variable_name in \
            APPLE_TEAM_ID \
            BUILD_KEYCHAIN_PASSWORD \
            APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 \
            APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD \
            APPLE_NOTARY_API_KEY_ID \
            APPLE_NOTARY_API_ISSUER_ID \
            APPLE_NOTARY_API_PRIVATE_KEY_P8_BASE64
          do
            if [ -z "${!variable_name}" ]; then
              echo "::error::Missing required GitHub Actions secret: ${variable_name}"
              exit 1
            fi
          done

          ZIP_NAME="${RELEASE_ASSET_BASENAME}.zip"
          SHA_NAME="${ZIP_NAME}.sha256"

          {
            echo "ZIP_NAME=${ZIP_NAME}"
            echo "SHA_NAME=${SHA_NAME}"
            echo "KEYCHAIN_PATH=${RUNNER_TEMP}/forgeff-build.keychain-db"
            echo "CERTIFICATE_PATH=${RUNNER_TEMP}/developer-id-application.p12"
            echo "NOTARY_KEY_PATH=${RUNNER_TEMP}/AuthKey_${APPLE_NOTARY_API_KEY_ID}.p8"
            echo "ARCHIVE_PATH=${RUNNER_TEMP}/ForgeFF.xcarchive"
            echo "ZIP_PATH=${RUNNER_TEMP}/${ZIP_NAME}"
            echo "SHA_PATH=${RUNNER_TEMP}/${SHA_NAME}"
          } >> "${GITHUB_ENV}"

      - name: Import Developer ID certificate into temporary keychain
        run: |
          set -euo pipefail

          printf '%s' "${APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64}" | base64 -D -o "${CERTIFICATE_PATH}"
          security create-keychain -p "${BUILD_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${BUILD_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${BUILD_KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: Archive signed Release app
        run: |
          set -euo pipefail

          xcodebuild \
            -project ForgeFF.xcodeproj \
            -scheme ForgeFF \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "${ARCHIVE_PATH}" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${KEYCHAIN_PATH}" \
            archive

          APP_PATH="${ARCHIVE_PATH}/Products/Applications/ForgeFF.app"
          test -d "${APP_PATH}"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"

      - name: Package release archive and checksum
        run: |
          set -euo pipefail

          APP_PATH="${ARCHIVE_PATH}/Products/Applications/ForgeFF.app"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ZIP_PATH}"
          shasum -a 256 "${ZIP_PATH}" > "${SHA_PATH}"

      - name: Notarize release archive
        run: |
          set -euo pipefail

          printf '%s' "${APPLE_NOTARY_API_PRIVATE_KEY_P8_BASE64}" | base64 -D -o "${NOTARY_KEY_PATH}"
          xcrun notarytool submit "${ZIP_PATH}" \
            --key "${NOTARY_KEY_PATH}" \
            --key-id "${APPLE_NOTARY_API_KEY_ID}" \
            --issuer "${APPLE_NOTARY_API_ISSUER_ID}" \
            --wait

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/${{ env.RELEASE_ASSET_BASENAME }}.zip
            ${{ runner.temp }}/${{ env.RELEASE_ASSET_BASENAME }}.zip.sha256
          generate_release_notes: true

      - name: Clean up temporary keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "${KEYCHAIN_PATH}" ]; then
            security delete-keychain "${KEYCHAIN_PATH}" || true
          fi
