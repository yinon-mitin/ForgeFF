name: macOS CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build and test
        run: |
          xcodebuild \
            -project ForgeFF.xcodeproj \
            -scheme ForgeFF \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            clean build test
